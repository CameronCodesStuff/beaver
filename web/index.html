<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEAVER — Voice Assistant</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <script type="text/javascript" src="/eel.js"></script>
</head>
<body>
  <div class="aurora"></div>
  <div class="grid-bg"></div>
  <div class="vignette"></div>
  <div class="noise"></div>

  <!-- INSTALL / FIRST-RUN OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <img src="assets/beaver.png" class="overlay-logo" id="overlayLogo" alt="Beaver" />
      <h1 class="overlay-title">BEAVER</h1>
      <p class="overlay-sub" id="overlaySub">Checking for the offline voice model…</p>

      <div class="progress" id="progressWrap" hidden>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">0%</div>
      </div>

      <button class="btn big" id="installBtn" hidden>⬇ INSTALL VOICE MODEL</button>
      <button class="btn big primary" id="enterBtn" hidden>⟶ ENTER BEAVER</button>
      <p class="overlay-foot">Everything runs locally. No accounts, no keys.</p>
    </div>
  </div>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <img src="assets/beaver.png" class="brand-logo" alt="" />
      <div class="brand-text">
        <span class="brand-name">BEAVER</span>
        <span class="brand-sub">local voice core</span>
      </div>
    </div>
    <div class="status-cluster">
      <span class="dot" id="statusDot"></span>
      <span class="status-text" id="statusText">STANDBY</span>
    </div>
  </header>

  <!-- STAGE -->
  <main class="stage">
    <section class="orb-panel">
      <div class="orb-wrap" id="orbWrap">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="glow"></div>
        <div class="orb" id="orb">
          <img src="assets/beaver.png" class="orb-face" alt="" />
          <div class="bars" id="bars"></div>
        </div>
      </div>

      <p class="subtitle" id="subtitle">Press <b>wake</b> and say “<span id="wakeHint">beaver</span> …”</p>

      <div class="controls">
        <button class="btn primary" id="micBtn">▶ WAKE BEAVER</button>
        <button class="btn" id="stopBtn" disabled>■ STOP</button>
      </div>

      <div class="manual">
        <input type="text" id="textInput" placeholder="or type a command…" />
        <button class="btn ghost" id="sendBtn">SEND</button>
      </div>

      <div class="hints">
        <span class="hint-title">TRY SAYING</span>
        <div class="chips" id="chips"></div>
      </div>
    </section>

    <section class="info-panel">
      <div class="viewport">
        <div class="viewport-head">
          <span id="vpTitle">VIEWPORT</span>
          <button class="vp-close" id="vpClose" title="clear">✕</button>
        </div>
        <div class="viewport-body" id="vpBody">
          <div class="vp-idle">
            <img src="assets/beaver.png" class="vp-idle-logo" alt="" />
            <p>Maps, video, weather, and search appear here.</p>
          </div>
        </div>
      </div>

      <div class="transcript">
        <div class="transcript-head">TRANSCRIPT</div>
        <div class="log" id="log"></div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
